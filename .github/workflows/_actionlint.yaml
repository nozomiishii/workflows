name: Lint GitHub Actions workflows

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read  # required by the reusable actionlint workflow (actions/checkout)
  pull-requests: read  # required by dorny/paths-filter (via the reusable actionlint workflow) to list PR files

jobs:
  actionlint:
    uses: ./.github/workflows/actionlint.yaml
