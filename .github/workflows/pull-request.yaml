name: Pull Request title

on:
  workflow_call:
    inputs:
      scopes:
        description: |
          Newline-separated whitelist of scopes allowed in PR titles (e.g. `feat(api): ...`).
          Default (empty) forbids all scopes — only `feat: ...` / `fix: ...` / `chore: ...` are accepted.
          Set this from the caller to opt in to specific scopes:
            scopes: |
              api
              cli
        type: string
        default: ''
        required: false

permissions: {}

defaults:
  run:
    shell: bash

jobs:
  validate:
    runs-on: ubuntu-slim
    timeout-minutes: 5
    permissions:
      pull-requests: write  # write: format revert PR titles, read: validate PR titles

    steps:
      # GitHub の Revert ボタンが生成する Revert "..." 形式を conventional commits に変換する。
      # GitHub 側にテンプレート変更機能はない: https://github.com/orgs/community/discussions/121757
      #   Revert "feat: add something" → revert: "feat: add something"
      #   Revert "fix(core): escape delimiters" → revert: "fix(core): escape delimiters"
      - name: Format revert PR title
        if: startsWith(github.event.pull_request.title, 'Revert "')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          new_title="revert: ${PR_TITLE#Revert }"
          gh pr edit "$PR_NUMBER" --title "$new_title" --repo "$REPO"

      - name: Validate PR title
        uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            chore
            revert
          scopes: ${{ inputs.scopes }}
          # When `scopes` is empty (default), forbid all scopes via a blacklist regex that matches
          # anything. When the caller opts in by passing `scopes`, drop the blacklist so the action's
          # whitelist (`scopes:`) is the sole gate.
          disallowScopes: ${{ inputs.scopes == '' && '.*' || '' }}
          subjectPattern: ^[a-z"][A-Za-z0-9 .,:;!?'"`@#$%&*()\[\]{}<>/\\|+=_~-]+(?<! )$
          subjectPatternError: |
            The subject "{subject}" found in the pull request title "{title}" didn't match the configured pattern.

            Please follow these rules:
            - Start with a lowercase English letter (a-z)
            - Use only English letters, numbers, spaces, and allowed punctuation
            - Do not end with a space
            - Do not use emojis

            Examples (valid):
            - feat: add new API
            - feat: fix bug #123
            - feat: update action to v6 @user

            Examples (invalid):
            - feat: Capital start (upper case)
            - feat: a  (too short)
            - feat: trailing space␠  (trailing space)
            - feat: emoji 🚀  (emoji not allowed)
            - feat: 日本語 (english only allowed)

  required:
    needs: [validate]
    if: always()
    runs-on: ubuntu-slim
    timeout-minutes: 1
    steps:
      - name: Fail if any required job failed or was cancelled
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: |
          echo "A required job failed or was cancelled"
          exit 1
