name: github-actions

on:
  workflow_call:
    inputs:
      persona:
        type: string
        default: auditor
        description: zizmor persona (regular / pedantic / auditor)

permissions: {}

defaults:
  run:
    shell: bash

jobs:
  changes:
    runs-on: ubuntu-slim
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read  # required by dorny/paths-filter to list PR files via the GitHub API
    outputs:
      src: ${{ steps.changes.outputs.src }}
    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Detect workflow changes
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: changes
        with:
          filters: |
            src:
              - '.github/**/*.yaml'

  actionlint:
    needs: changes
    if: needs.changes.outputs.src == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Run actionlint
        # https://github.com/rhysd/actionlint
        #
        # To run locally, execute the following command:
        # docker run --rm -v "$(pwd):$(pwd)" -w "$(pwd)" rhysd/actionlint:latest
        uses: docker://rhysd/actionlint:1.7.12@sha256:b1934ee5f1c509618f2508e6eb47ee0d3520686341fec936f3b79331f9315667
        with:
          args: -color

  zizmor:
    needs: changes
    if: needs.changes.outputs.src == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      actions: read  # required for zizmor persona audits to inspect referenced actions metadata
    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Ensure zizmor config
        # caller repo に .github/zizmor.yaml が無ければ、呼び出し時の SHA と同じ commit から
        # nozomiishii/workflows の .github/zizmor.yaml を fetch して置く。
        # caller が独自 config を commit した場合はそのまま尊重する。single source of
        # truth は library 側の .github/zizmor.yaml のみ（inline 複製による二重管理を避ける）。
        #
        # github.job_workflow_sha は runner bug (actions/runner#2417) で空になるため、
        # workflow run API の referenced_workflows から SHA を解決する。
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eu
          if [ -f .github/zizmor.yaml ]; then
            echo "Using caller's .github/zizmor.yaml"
            exit 0
          fi
          # referenced_workflows は複数 match し得る（同一 workflow を異なる ref で複数 job が呼ぶ等）。
          # 改行区切りで複数 SHA が返ると後段の curl URL が壊れるため first で 1 件に絞る。
          sha=$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            --jq '[.referenced_workflows[] | select(.path | startswith("nozomiishii/workflows/.github/workflows/github-actions.yaml@")) | .sha] | first // empty')
          if [ -z "${sha}" ]; then
            echo "Failed to resolve nozomiishii/workflows SHA from workflow run" >&2
            echo "This workflow expects to be invoked as nozomiishii/workflows/... — forks/mirrors must ship their own .github/zizmor.yaml." >&2
            exit 1
          fi
          echo "Fetching shared default from nozomiishii/workflows@${sha}"
          mkdir -p .github
          curl -sSfL \
            "https://raw.githubusercontent.com/nozomiishii/workflows/${sha}/.github/zizmor.yaml" \
            -o .github/zizmor.yaml

      - name: Run zizmor
        # https://github.com/zizmorcore/zizmor-action
        #
        # To run locally, execute the following command:
        # uvx zizmor --persona=auditor ./.github/workflows/
        uses: zizmorcore/zizmor-action@6599ee8b7a49aef6a770f63d261d214911a7ce02 # v0.6.0
        with:
          persona: ${{ inputs.persona }}
          advanced-security: false

  required:
    needs: [changes, actionlint, zizmor]
    if: always()
    runs-on: ubuntu-slim
    timeout-minutes: 1
    steps:
      - name: Fail if any required job failed or was cancelled
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: |
          echo "A required job failed or was cancelled"
          exit 1
