name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - main

defaults:
  run:
    shell: bash

# 同時実行を防止し、release-please のタグ作成と release PR 更新が競合するのを回避する
concurrency:
  group: release
  cancel-in-progress: false

permissions: {}

jobs:
  release-please:
    runs-on: ubuntu-slim
    timeout-minutes: 10
    permissions:
      contents: write  # required by release-please to push release commits, tags, and create GitHub releases
      pull-requests: write  # required by release-please to open and update release PRs (incl. PR labels)

    steps:
      - name: Load secrets from 1Password
        id: secrets
        uses: 1password/load-secrets-action@92467eb28f72e8255933372f1e0707c567ce2259 # v4.0.0
        with:
          version: "2.34.0"
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          APP_ID: op://github-app/nozomiishii-release/username
          APP_PRIVATE_KEY: op://github-app/nozomiishii-release/credential

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ steps.secrets.outputs.APP_ID }}
          private-key: ${{ steps.secrets.outputs.APP_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write

      - name: Run release-please
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          config-file: .github/.release-please-config.json
          manifest-file: .github/.release-please-manifest.json
          token: ${{ steps.app-token.outputs.token }}
