rules:
  # anonymous-definition: 各 job に name: を付ける best practice 指摘。
  # name: があれば job ID を rename しても合成 check 名を据え置ける backward
  # compatibility が得られるが、対価として job ID と name: の double management が
  # 恒常的に発生する。ID rename の頻度より double management のコストの方が高いと
  # 判断し、rule を全体 off にして「job ID を唯一の合成 check 名ソース」に統一する。
  anonymous-definition:
    disable: true

  # secrets-outside-env: secret を environment 付き job 以外から参照しない、という監査。
  # Environment 化で caller 側の job 単位に secret 露出を閉じ込められるメリットがあるが、
  # 本 repo は 1Password SA token (OP_SERVICE_ACCOUNT_TOKEN) を single entry point として
  # 1Password 側 vault scoping で blast radius を限定している。GitHub Environment を
  # 重ねても同じ master key を別の箱に詰め直すだけで scope は変わらないため、
  # double management のコストが Environment のメリットを上回る。
  # OP_SERVICE_ACCOUNT_TOKEN のみ allowlist し、他の secret が environment 無しで
  # 参照された時は従来通り検出できる状態を保つ。
  secrets-outside-env:
    config:
      allow:
        - OP_SERVICE_ACCOUNT_TOKEN
