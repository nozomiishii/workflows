# zizmor configuration
# ref: https://docs.zizmor.sh/configuration/

rules:
  secrets-outside-env:
    # OP_SERVICE_ACCOUNT_TOKEN は 1Password Service Account の token で、
    # GitHub 側では single entry point として repository secret で管理する。
    # 1Password 集約運用では GitHub Environment で access gate を追加しても、
    # 同じ SA token を environment 側に詰め直すだけで実効的な blast radius
    # の縮小にならない。保護は 1Password SA の vault scoping（repo 単位で
    # vault を分離）側で実施している。
    #
    # 将来 SA を用途別に分割し、release に approval gate を付けたい段階で
    # Environment 化を再評価する。
    config:
      allow:
        - OP_SERVICE_ACCOUNT_TOKEN
