rules:
  # anonymous-definition は「job に name: を付けよう」という info 指摘。
  # この repo は job ID をそのまま check 名として使う命名規則（CLAUDE.md「Job 命名規則」参照）のため、
  # name: を足すと ID との重複になるか、あるいは ID と name が drift するリスクが出る。
  # よって anonymous-definition は意図的に ignore する。
  #
  # 対象は .github/workflows/ 配下で job を直接定義している全ファイル。
  # caller 側の _<name>.yaml は内側 job が `uses:` だけなのでこの rule には引っかからない。
  anonymous-definition:
    ignore:
      - actionlint.yaml
      - github-actions.yaml
      - pull-request.yaml
      - __release.yaml
      - secret-scan.yaml
      - secretlint.yaml

  # secrets-outside-env は「secret を environment 付き job 以外で参照しない」という auditor 監査。
  # OP_SERVICE_ACCOUNT_TOKEN は 1Password Service Account の token で、
  # GitHub 側は single entry point として repository secret 1 本のみ管理する運用。
  # blast radius の縮小は GitHub Environment ではなく 1Password SA の vault scoping
  # （repo 単位で vault を分離）側で担っているため、Environment 化は二重定義になる。
  # 将来 release に approval gate を付けたい段階で Environment 化を再評価する。
  secrets-outside-env:
    config:
      allow:
        - OP_SERVICE_ACCOUNT_TOKEN
